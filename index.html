<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>no-food</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Anzeige oben links: Inventar -->
  <div id="inventory">
    <div class="slot"><span class="icon">🪵</span><span id="inv-wood">0</span></div>
    <div class="slot"><span class="icon">🪨</span><span id="inv-stone">0</span></div>
    <div class="slot"><span class="icon">🍓</span><span id="inv-berry">0</span></div>
  </div>

  <!-- Anzeige unten: Lebens- und Hungerbalken -->
  <div id="bars">
    <div class="bar"><div id="health-fill" class="fill health"></div><span class="bar-label">❤️ Leben</span></div>
    <div class="bar"><div id="hunger-fill" class="fill hunger"></div><span class="bar-label">🍖 Hunger</span></div>
  </div>

  <!-- Kurze Steuerungs-Hilfe -->
  <div id="help">
    WASD = Laufen &nbsp;|&nbsp; Maus = Schauen &nbsp;|&nbsp; Klick = Schlagen &nbsp;|&nbsp; E = Beere essen
  </div>

  <!-- Todes-Bildschirm -->
  <div id="death-screen" class="hidden">
    <h1>Du bist verhungert!</h1>
    <p>Überlebte Zeit: <span id="survival-time">0</span> Sekunden</p>
    <button id="restart-btn">Nochmal spielen</button>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
